name: Secret Leak Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - "**"

permissions:
  contents: read
  pull-requests: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run secret-leak-sentinel scan
        id: scan
        uses: ./
        with:
          command: scan-path
          path: .
          json-output: reports/secret-scan.json
          markdown-output: reports/secret-scan.md
          fail-on-severity: high

      - name: Upload scan artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-leak-scan-report
          path: |
            reports/secret-scan.json
            reports/secret-scan.md
          if-no-files-found: ignore

      - name: Comment on PR when findings are detected
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          SCAN_EXIT_CODE: ${{ steps.scan.outcome == 'failure' && '1' || '0' }}
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/secret-scan.md';
            const marker = '<!-- secret-leak-sentinel-comment -->';

            let body = `${marker}\n## Secret Leak Sentinel\n\n`;
            if (fs.existsSync(path)) {
              const report = fs.readFileSync(path, 'utf8').trim();
              if (report.length > 0) {
                body += `Detected potential secrets. See report summary below:\n\n${report.substring(0, 60000)}`;
              } else {
                body += 'Scan completed with no findings.';
              }
            } else {
              body += 'Scan completed, but no markdown report was generated.';
            }

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const existing = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });

            const previous = existing.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));

            if (previous) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: previous.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
